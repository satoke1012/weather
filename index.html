<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太田市 天気サイネージ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="title">群馬県 太田市 天気情報</div>
    <div id="clock">--:--:--</div>
</header>

<main class="main">

    <!-- 天気 -->
    <section class="weather">
        <div id="weatherIcon">☀️</div>
        <div id="weatherText">読み込み中...</div>
    </section>

    <!-- 気温 -->
    <section class="temp">
        <div>
            <div>最高</div>
            <div id="maxTemp">--℃</div>
        </div>

        <div>
            <div>最低</div>
            <div id="minTemp">--℃</div>
        </div>
    </section>

    <!-- 降水 -->
    <section class="rain">
        <div>今日 <span id="rain0">--%</span></div>
        <div>明日 <span id="rain1">--%</span></div>
        <div>明後日 <span id="rain2">--%</span></div>
    </section>

</main>

<footer>
    <div id="updateTime">--</div>
</footer>

<script src="script.js"></script>

</body>
</html>
