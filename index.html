<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太田市 天気サイネージ Ver.3</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- ================= ヘッダー ================= -->
    <header class="header">

        <div class="location">
            群馬県 太田市
        </div>

        <div class="logo-area">
            <img src="logo.png" class="logo" alt="施設ロゴ">
        </div>

    </header>

    <!-- ================= 左側（天気） ================= -->
    <main class="weather-panel">

        <div class="weather-icon" id="weatherIcon">
            ☀️
        </div>

        <div class="weather-text" id="weatherText">
            読み込み中...
        </div>

        <div class="temperature">

            <div class="temp-box">
                <div class="label">最高気温</div>
                <div class="value" id="maxTemp">--</div>
            </div>

            <div class="temp-box">
                <div class="label">最低気温</div>
                <div class="value" id="minTemp">--</div>
            </div>

        </div>

    </main>

    <!-- ================= 右側 ================= -->
    <aside class="side-panel">

        <!-- 時計 -->
        <section class="clock-area">

            <div id="date"></div>

            <div id="clock"></div>

        </section>

        <!-- 降水確率 -->
        <section class="rain-panel">

            <h2>降水確率</h2>

            <div class="rain-card">
                <span>今日</span>
                <span id="rain0">--%</span>
            </div>

            <div class="rain-card">
                <span>明日</span>
                <span id="rain6">--%</span>
            </div>

            <div class="rain-card">
                <span>明後日</span>
                <span id="rain12">--%</span>
            </div>

            <div class="rain-card">
                <span>3日後</span>
                <span id="rain18">--%</span>
            </div>

        </section>

    </aside>

</div>

<footer>

    <div id="updateTime">
        気象データ取得中...
    </div>

</footer>

<script src="script.js"></script>

</body>

</html>
