<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太田市 天気サイネージ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- ===== 左側：天気 ===== -->
    <section class="weather-panel">

        <div class="location">
            群馬県 太田市
        </div>

        <div class="weather-icon" id="weatherIcon">
            ☀️
        </div>

        <div class="weather-text" id="weatherText">
            読み込み中...
        </div>

        <div class="temperature">

            <div class="temp-box">
                <div class="label">最高気温</div>
                <div class="value" id="maxTemp">--</div>
            </div>

            <div class="temp-box">
                <div class="label">最低気温</div>
                <div class="value" id="minTemp">--</div>
            </div>

        </div>

    </section>

    <!-- ===== 右側 ===== -->
    <section class="side-panel">

        <!-- ロゴ -->
        <div class="logo-area">

            <img src="logo.png" class="logo" alt="ロゴ">

        </div>

        <!-- 時計 -->
        <div class="clock-area">

            <div id="date"></div>

            <div id="clock"></div>

        </div>

        <!-- 降水確率 -->
        <div class="rain">

            <h2>降水確率</h2>

            <div class="rain-simple">

                <div id="rain0">今日 --%</div>

                <div id="rain6">明日 --%</div>

                <div id="rain12">明後日 --%</div>

                <div id="rain18">3日後 --%</div>

            </div>

        </div>

    </section>

</div>

<footer>

    <div id="updateTime">

        気象データ取得中...

    </div>

</footer>

<script src="script.js"></script>

</body>

</html>
