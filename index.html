<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>太田市 天気サイネージ Ver.4</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- ==========================
            ヘッダー
    =========================== -->

    <header class="header">

        <div class="location">

            群馬県 太田市

        </div>

        <div class="logo-area">

            <img src="logo.png" class="logo" alt="ロゴ">

        </div>

    </header>


    <!-- ==========================
            メイン
    =========================== -->

    <main class="main-area">

        <!-- 左側 -->

        <section class="weather-panel">

            <div id="weatherIcon" class="weather-icon">

                ☀️

            </div>

            <div id="weatherText" class="weather-text">

                天気取得中...

            </div>

            <div class="temperature">

                <div class="temp-box">

                    <div class="label">

                        最高

                    </div>

                    <div id="maxTemp" class="value">

                        --

                    </div>

                </div>

                <div class="temp-box">

                    <div class="label">

                        最低

                    </div>

                    <div id="minTemp" class="value">

                        --

                    </div>

                </div>

            </div>

        </section>


        <!-- 右側 -->

        <aside class="side-panel">

            <!-- 時計 -->

            <section class="clock-panel">

                <div id="date"></div>

                <div id="clock"></div>

            </section>


            <!-- 降水確率 -->

            <section class="rain-panel">

                <h2>

                    降水確率

                </h2>

                <div class="rain-card">

                    <span>今日</span>

                    <span id="rainToday">

                        --

                    </span>

                </div>

                <div class="rain-card">

                    <span>明日</span>

                    <span id="rainTomorrow">

                        --

                    </span>

                </div>

                <div class="rain-card">

                    <span>明後日</span>

                    <span id="rainAfter">

                        --

                    </span>

                </div>

            </section>

        </aside>

    </main>

</div>


<footer>

    <div id="updateTime">

        気象データ取得中...

    </div>

</footer>

<script src="script.js"></script>

</body>

</html>
